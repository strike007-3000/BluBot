name: Daily AI News Post

on:
  schedule:
    - cron: '0 7,13 * * *' # 9:00 AM and 3:00 PM (UTC+2)
  workflow_dispatch: # Allows manual triggering

# Ensure only one run updates the state branch at a time
concurrency:
  group: bsky-persistence-state
  cancel-in-progress: false

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mask Session Metadata
        run: |
          echo "::add-mask::${{ github.run_id }}"
          echo "::add-mask::${{ github.run_attempt }}"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Restore persistence state
        run: |
          git fetch origin automated/state || echo "automated/state branch not found"
          git checkout origin/automated/state -- seen_articles.json || echo "seen_articles.json not found in state branch"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore BlueSky session
        uses: actions/cache/restore@v6
        with:
          path: bluesky_session.txt
          key: bsky-session-${{ github.run_id }}
          restore-keys: |
            bsky-session-

      - name: Run bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          NVIDIA_KEY: ${{ secrets.NVIDIA_KEY }}
          IMAGE_PROVIDER: nvidia
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          ENABLE_BSKY_COMMENT_REPLIES: ${{ vars.ENABLE_BSKY_COMMENT_REPLIES || 'true' }}
          ENABLE_MASTODON_COMMENT_REPLIES: ${{ vars.ENABLE_MASTODON_COMMENT_REPLIES || 'false' }}
          ENABLE_THREADS_COMMENT_REPLIES: ${{ vars.ENABLE_THREADS_COMMENT_REPLIES || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          TELEGRAM_TIMEOUT_MINUTES: ${{ secrets.TELEGRAM_TIMEOUT_MINUTES || '5' }}
          ENABLE_TELEGRAM_APPROVAL: ${{ secrets.ENABLE_TELEGRAM_APPROVAL || 'true' }}
          ENABLE_HASHTAGS_BSKY: ${{ secrets.ENABLE_HASHTAGS_BSKY || 'false' }}
          ENABLE_HASHTAGS_MASTODON: ${{ secrets.ENABLE_HASHTAGS_MASTODON || 'true' }}
          ENABLE_HASHTAGS_THREADS: ${{ secrets.ENABLE_HASHTAGS_THREADS || 'true' }}
          LOG_FORMAT: pretty
        run: python bot.py

      - name: Save BlueSky session
        if: always()
        uses: actions/cache/save@v6
        with:
          path: bluesky_session.txt
          key: bsky-session-${{ github.run_id }}

      - name: Commit and push state to automated/state
        if: success()
        run: |
          # Save current state files
          mkdir -p /tmp/state
          cp seen_articles.json STATUS.md /tmp/state/

          # Clone automated/state branch (or create if it doesn't exist)
          git clone --depth 1 --branch automated/state https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git state-branch || {
            mkdir state-branch
            cd state-branch
            git init
            git checkout -b automated/state
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            cd ..
          }

          cd state-branch
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"

          # Copy state files in
          cp /tmp/state/seen_articles.json /tmp/state/STATUS.md .

          # Track only these files
          git add seen_articles.json STATUS.md

          if git diff --cached --quiet; then
            echo "No state changes to push."
            exit 0
          fi

          git commit -m "chore: update bot state [skip ci]"
          git push origin automated/state
