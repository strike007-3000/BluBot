name: Daily AI News Post

on:
  schedule:
    - cron: '0 7,13 * * *' # 9:00 AM and 3:00 PM (UTC+2)
  workflow_dispatch: # Allows manual triggering

# Ensure only one run updates the state branch at a time
concurrency:
  group: bsky-persistence-state
  cancel-in-progress: false

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mask Session Metadata
        run: |
          echo "::add-mask::${{ github.run_id }}"
          echo "::add-mask::${{ github.run_attempt }}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore persistence state
        run: |
          git fetch origin automated/state || echo "automated/state branch not found"
          git checkout origin/automated/state -- seen_articles.json || echo "seen_articles.json not found in state branch"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore BlueSky session
        uses: actions/cache/restore@v5
        with:
          path: bluesky_session.txt
          key: bsky-session-${{ github.run_id }}
          restore-keys: |
            bsky-session-

      - name: Run bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          NVIDIA_KEY: ${{ secrets.NVIDIA_KEY }}
          IMAGE_PROVIDER: nvidia
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python bot.py

      - name: Save BlueSky session
        if: always()
        uses: actions/cache/save@v5
        with:
          path: bluesky_session.txt
          key: bsky-session-${{ github.run_id }}

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Stage changes (including STATUS.md dashboard)
          git add seen_articles.json STATUS.md || echo "No changes to state or status"
          git commit -m "Update seen articles and dashboard [skip ci]" || exit 0
          
          # P2 Bug Fix: Bootstrap automated/state branch if it doesn't exist
          if ! git ls-remote --exit-code --heads origin automated/state; then
            echo "automated/state branch not found. Bootstrapping new state branch..."
            git push origin HEAD:automated/state
            exit 0
          fi

          # Safe rebase strategy: use --autostash and favor latest state (-Xtheirs)
          git fetch origin automated/state
          git pull origin automated/state --rebase=merges --autostash -Xtheirs
          git push origin HEAD:automated/state
