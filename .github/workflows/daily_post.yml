name: Daily AI News Post

on:
  schedule:
    - cron: '0 7,13 * * *' # 9:00 AM and 3:00 PM (UTC+2)
  workflow_dispatch: # Allows manual triggering

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for branch switching

      - name: Restore persistence state
        run: |
          git fetch origin automated/state || echo "automated/state branch not found"
          git checkout origin/automated/state -- seen_articles.json || echo "seen_articles.json not found in state branch"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore BlueSky session
        uses: actions/cache/restore@v4
        with:
          path: bluesky_session.txt
          key: bsky-session-${{ github.run_id }}
          restore-keys: |
            bsky-session-

      - name: Run bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python bot.py

      - name: Save BlueSky session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: bluesky_session.txt
          key: bsky-session-${{ github.run_id }}

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add seen_articles.json
          git commit -m "Update seen articles [skip ci]" || echo "No changes to commit"
          # Push to a dedicated state branch using --force to ensure persistence even if histories diverge
          git push origin HEAD:automated/state --force
