name: Weekly Curation Config Update

on:
  schedule:
    - cron: '0 2 * * 5' # 2:00 AM UTC every Friday (4:00 AM UTC+2)
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: weekly-config-update
  cancel-in-progress: true

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run config updater
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          IMAGE_PROVIDER: nvidia
          LOG_FORMAT: pretty
        run: python scripts/update_config_keywords.py

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Stage config updates
          git add src/config.py || echo "No changes to config"
          git commit -m "chore: weekly update of trending products and keywords [skip ci]" || exit 0
          
          # Attempt direct push to main, fallback to creating PR if protected
          git push origin HEAD:main || {
            echo "Push to main rejected. Creating PR..."
            git checkout -b automated/config-update
            git push origin automated/config-update --force
            gh pr create --title "chore: weekly update of trending products and keywords" --body "Automated weekly update of trending products and keywords generated by Gemini." --head automated/config-update --base main || echo "PR already exists or failed to create"
          }
