name: CI Verification

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostic Check
        run: |
          python -m pip check
          python -c "from src.config import validate_config; print('Configuration logic verified')"
          python -c "from src.curator import fetch_news; print('Import logic verified')"
